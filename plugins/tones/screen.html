<div class="max-w-5xl mx-auto px-6 pt-24 pb-16">
    <button onclick="showScreen('home')" class="text-gray-500 hover:text-white text-sm mb-6 flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Back
    </button>
    <h2 class="text-3xl font-bold text-white mb-2">Tone Player</h2>
    <p class="text-gray-500 mb-8">View the amp, pedal, and cabinet signal chains used in your songs.</p>

    <!-- Status -->
    <div id="tp-status" class="mb-6"></div>

    <!-- Search -->
    <div class="flex gap-3 mb-6">
        <input type="text" id="tp-search" placeholder="Search a song..." onkeydown="if(event.key==='Enter')tpSearch()"
            class="flex-1 bg-dark-700 border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-gray-300 placeholder-gray-600 focus:border-accent/50 outline-none">
        <button onclick="tpSearch()" class="bg-dark-600 hover:bg-dark-500 px-5 py-2.5 rounded-xl text-sm text-gray-300 transition">Search</button>
    </div>
    <div id="tp-search-results" class="space-y-2 mb-8"></div>

    <!-- Tone display -->
    <div id="tp-tones" class="space-y-8"></div>
</div>
